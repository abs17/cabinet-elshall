<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abdallah Elshall · Avocat d'affaires · Le Caire</title>
  <meta name="description" content="Cabinet d'avocat d'affaires basé au Caire. Conseil stratégique, contentieux, M&A. Quatre paliers d'accompagnement — Classique, Express, VIP, Fast VIP." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="image-slot.js"></script>
  <script src="translations.js"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const initial = (() => {
        const saved = (typeof localStorage !== "undefined") && localStorage.getItem("elshall_lang");
        if (saved && window.I18N[saved]) return saved;
        return "fr";
      })();
      const [lang, setLangState] = useState(initial);
      const t = window.I18N[lang];

      const setLang = (code) => {
        setLangState(code);
        try { localStorage.setItem("elshall_lang", code); } catch (_) {}
      };

      useEffect(() => {
        document.documentElement.lang = lang;
        document.documentElement.dir = t.dir;
      }, [lang]);

      return (
        <React.Fragment>
          <Nav t={t} lang={lang} setLang={setLang} />
          <main>
            <Hero t={t} lang={lang} />
            <Services t={t} />
            <Approach t={t} />
            <Trust t={t} />
            <Verbatim t={t} />
            <Contact t={t} lang={lang} />
          </main>
          <Footer t={t} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
